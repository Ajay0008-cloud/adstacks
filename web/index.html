<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AdStacks Media Office Dashboard Application">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AdStacks Dashboard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AdStacks Media Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0F1225;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
      overflow: hidden;
    }
    .loading-container {
      text-align: center;
      transition: opacity 0.4s ease-out;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(139, 92, 246, 0.2);
      border-top: 4px solid #8B5CF6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #FFFFFF;
    }
    .loading-subtitle {
      font-size: 13px;
      color: #94A3B8;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-title">AdStacks Media</div>
    <div class="loading-subtitle">Launching Office Dashboard...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      var checkFlutter = setInterval(function() {
        if (window._flutter && window._flutter.loader) {
          clearInterval(checkFlutter);
        }
      }, 50);
    });
  </script>
</body>
</html>
